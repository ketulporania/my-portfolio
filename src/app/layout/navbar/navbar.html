<header
  class="fixed top-0 left-0 right-0 z-50 bg-slate-900/90 backdrop-blur-md border-b border-slate-700">

  <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">

    <!-- Logo -->
    <a href="#home" (click)="closeMenu()" class="font-bold text-xl text-cyan-400 hover:text-cyan-300 transition-colors">
      Ketul.dev
    </a>

    <!-- Desktop Nav -->
    <nav class="hidden md:flex gap-8 text-slate-300 text-sm font-medium">
      <a href="#home"       class="hover:text-cyan-400 transition-colors duration-200">Home</a>
      <a href="#about"      class="hover:text-cyan-400 transition-colors duration-200">About</a>
      <a href="#skills"     class="hover:text-cyan-400 transition-colors duration-200">Skills</a>
      <a href="#experience" class="hover:text-cyan-400 transition-colors duration-200">Experience</a>
      <a href="#projects"   class="hover:text-cyan-400 transition-colors duration-200">Projects</a>
      <a href="#contact"    class="hover:text-cyan-400 transition-colors duration-200">Contact</a>
    </nav>

    <!-- Hamburger Button -->
    <button
      (click)="toggleMenu()"
      aria-label="Toggle navigation menu"
      [attr.aria-expanded]="isMenuOpen()"
      class="md:hidden flex flex-col justify-center items-center w-10 h-10 gap-1.5 rounded-lg
             hover:bg-slate-800 transition-colors duration-200">
      <span class="w-6 h-0.5 bg-white rounded-full transition-all duration-300"
        [class.rotate-45]="isMenuOpen()" [class.translate-y-2]="isMenuOpen()"></span>
      <span class="w-6 h-0.5 bg-white rounded-full transition-all duration-300"
        [class.opacity-0]="isMenuOpen()" [class.scale-x-0]="isMenuOpen()"></span>
      <span class="w-6 h-0.5 bg-white rounded-full transition-all duration-300"
        [class.-rotate-45]="isMenuOpen()" [class.-translate-y-2]="isMenuOpen()"></span>
    </button>

  </div>

  <!-- Mobile Dropdown — scrollable, never overflows screen -->
  @if(isMenuOpen()) {
    <div
      class="md:hidden bg-slate-900/95 backdrop-blur-md border-t border-slate-700
             px-6 py-4 flex flex-col gap-1 overflow-y-auto"
      style="max-height: calc(100vh - 4rem);">

      <a href="#home"       (click)="closeMenu()" class="mobile-nav-link">Home</a>
      <a href="#about"      (click)="closeMenu()" class="mobile-nav-link">About</a>
      <a href="#skills"     (click)="closeMenu()" class="mobile-nav-link">Skills</a>
      <a href="#experience" (click)="closeMenu()" class="mobile-nav-link">Experience</a>
      <a href="#projects"   (click)="closeMenu()" class="mobile-nav-link">Projects</a>
      <a href="#contact"    (click)="closeMenu()" class="mobile-nav-link">Contact</a>

    </div>
  }

</header>
