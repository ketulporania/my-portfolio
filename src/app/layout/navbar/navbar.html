<header class="navbar" [class.navbar--scrolled]="isScrolled()">
  <div class="navbar__inner">
    <a href="#home" (click)="closeMenu()" class="navbar__logo">
      Ketul<span>.tech</span>
    </a>

    <nav class="navbar__nav">
      <a href="#home">Home</a>
      <a href="#about">About</a>
      <a href="#skills">Skills</a>
      <a href="#experience">Experience</a>
      <a href="#projects">Projects</a>
      <a href="#contact" class="navbar__cta">Contact</a>
    </nav>

    <button
      (click)="toggleMenu()"
      aria-label="Toggle navigation menu"
      [attr.aria-expanded]="isMenuOpen()"
      class="navbar__toggle">
      <span [class.is-open]="isMenuOpen()"></span>
      <span [class.is-open]="isMenuOpen()"></span>
      <span [class.is-open]="isMenuOpen()"></span>
    </button>
  </div>

  @if (isMenuOpen()) {
    <nav class="navbar__mobile">
      <a href="#home" (click)="closeMenu()">Home</a>
      <a href="#about" (click)="closeMenu()">About</a>
      <a href="#skills" (click)="closeMenu()">Skills</a>
      <a href="#experience" (click)="closeMenu()">Experience</a>
      <a href="#projects" (click)="closeMenu()">Projects</a>
      <a href="#contact" (click)="closeMenu()" class="navbar__cta">Contact</a>
    </nav>
  }
</header>
