<section
  id="experience"
  class="py-28 bg-slate-950 text-white">

  <div class="max-w-5xl mx-auto px-6">

    <!-- Section Title -->
    <h2 class="text-4xl md:text-5xl font-bold text-center">Professional Experience</h2>
    <div class="w-16 h-1 bg-cyan-400 mx-auto mt-4 rounded-full"></div>

    <!-- Timeline -->
    <div class="mt-16 space-y-8">

      @for(exp of experiences; track exp.company) {

        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 hover:border-cyan-500/40 transition-all duration-300">

          <!-- Header -->
          <div class="flex flex-col md:flex-row md:justify-between md:items-start gap-4">

            <div>
              <div class="flex items-center gap-3 flex-wrap">
                <h3 class="text-2xl font-bold text-white">{{ exp.role }}</h3>
               
              </div>
              <p class="text-lg text-cyan-400 font-medium mt-1">{{ exp.company }}</p>
              <p class="text-slate-500 text-sm mt-1">{{ exp.type }}</p>
            </div>

            <!-- Duration -->
            <div class="flex-shrink-0 text-right">
              <span class="px-4 py-2 rounded-xl bg-slate-800 border border-slate-700 text-slate-300 text-sm font-medium">
                {{ exp.duration }}
              </span>
            </div>

          </div>

          <!-- Tech Stack -->
          <div class="flex flex-wrap gap-2 mt-6">
            @for(tech of exp.techStack; track tech) {
              <span class="px-3 py-1 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-300 text-xs font-medium">
                {{ tech }}
              </span>
            }
          </div>

          <!-- Achievements -->
          <ul class="mt-6 space-y-3">
            @for(item of exp.achievements; track item) {
              <li class="flex gap-3 items-start">
                <span class="mt-1 flex-shrink-0 w-5 h-5 rounded-full bg-cyan-500/10 border border-cyan-500/30 flex items-center justify-center">
                  <span class="text-cyan-400 text-xs">✓</span>
                </span>
                <p class="text-slate-300 leading-7">{{ item }}</p>
              </li>
            }
          </ul>

        </div>

      }

    </div>

  </div>

</section>
