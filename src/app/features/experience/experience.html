<section id="experience" class="pf-section pf-section--dark experience-section">
  <div class="pf-container--narrow px-6">
    <header class="pf-section-header" scrollReveal>
      <span class="pf-eyebrow">Career</span>
      <h2 class="pf-section-title">Professional Experience</h2>
      <div class="pf-section-divider"></div>
    </header>

    <div class="space-y-6 pf-stagger" scrollReveal [scrollRevealStagger]="true">
      @for (exp of experiences; track exp.company; let i = $index) {
        <article class="pf-card experience-card" [style.--i]="i">
          <div class="experience-card__header">
            <div>
              <h3 class="experience-card__role">{{ exp.role }}</h3>
              <p class="experience-card__company">{{ exp.company }}</p>
              <p class="experience-card__type">{{ exp.type }}</p>
            </div>
            <span class="experience-card__duration">{{ exp.duration }}</span>
          </div>

          <div class="experience-card__tags">
            @for (tech of exp.techStack; track tech) {
              <span class="pf-badge pf-badge--advanced">{{ tech }}</span>
            }
          </div>

          <ul class="experience-card__list">
            @for (item of exp.achievements; track item) {
              <li>
                <span class="experience-card__check">✓</span>
                <span>{{ item }}</span>
              </li>
            }
          </ul>
        </article>
      }
    </div>
  </div>
</section>
