<section
  id="experience"
  class="py-28 bg-slate-950 text-white">

  <div class="max-w-6xl mx-auto px-6">

    <h2
      class="text-4xl md:text-5xl font-bold text-center">

      Professional Experience

    </h2>

    <div
      class="mt-16 bg-slate-900 border border-slate-800 rounded-2xl p-8">

      @for(exp of experiences; track exp.company) {

        <div>

          <div
            class="flex flex-col md:flex-row md:justify-between md:items-center">

            <div>

              <h3
                class="text-2xl font-semibold text-cyan-400">

                {{ exp.role }}

              </h3>

              <p
                class="text-lg text-slate-300">

                {{ exp.company }}

              </p>

            </div>

            <span
              class="mt-3 md:mt-0 text-slate-400">

              {{ exp.duration }}

            </span>

          </div>

          <div
            class="mt-8 space-y-4">

            @for(item of exp.achievements; track item) {

              <div class="flex gap-3">

                <span class="text-cyan-400">
                  ✓
                </span>

                <p class="text-slate-300">
                  {{ item }}
                </p>

              </div>

            }

          </div>

        </div>

      }

    </div>

  </div>

</section>
